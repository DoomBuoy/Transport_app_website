<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become a Tester | Sydly</title>
    <meta name="description" content="Join the Sydly Beta Testing program. Help shape the future of NSW transit apps.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        electric: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366F1', 600: '#4F46E5', 900: '#312e81' },
                        vibrant: { 100: '#ffe4e6', 500: '#F43F5E', 600: '#e11d48' },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- Abstract Background -->
    <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-electric-500 rounded-full blur-[150px] opacity-10 pointer-events-none -z-10 text-right -mt-40 -mr-40"></div>
    <div class="absolute top-40 left-0 w-[500px] h-[500px] bg-vibrant-500 rounded-full blur-[150px] opacity-5 pointer-events-none -z-10 -ml-40"></div>

    <!-- Simple Nav -->
    <nav class="w-full bg-white/80 backdrop-blur-md border-b border-slate-100 py-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <img src="Asset/logo.png" alt="Sydly" class="w-8 h-8 rounded-lg shadow-sm object-cover" onerror="this.src='https://via.placeholder.com/32'">
                <span class="font-bold text-xl tracking-tight text-slate-900">Syd<span class="text-electric-500">ly</span></span>
            </div>
            <a href="index.html" class="text-sm font-bold text-slate-500 hover:text-electric-600 transition flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-full hover:bg-electric-50">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto px-6 py-12 md:py-20 w-full z-10">
        
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-2 px-4 py-2 mb-6 rounded-full bg-electric-50 border border-electric-100 text-electric-700 text-sm font-bold shadow-sm">
                <i class="fa-solid fa-flask text-electric-500"></i>
                Beta Program Open
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">Become a Tester</h1>
            <p class="text-lg text-slate-600 max-w-xl mx-auto leading-relaxed">
                Get exclusive early access to unreleased features, help us squash bugs, and directly shape the future of navigating NSW.
            </p>
        </div>

        <!-- Form Container -->
        <div class="bg-white p-8 md:p-10 rounded-[2.5rem] border border-slate-100 shadow-2xl shadow-slate-200/50">
            <form action="https://formspree.io/f/xreakgzd" method="POST" id="testerForm">
                <!-- Hidden identifier for Formspree -->
                <input type="hidden" name="form_type" value="beta_tester_application">

                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <!-- Full Name -->
                    <div>
                        <label class="block text-slate-700 text-xs font-bold uppercase tracking-wider mb-2">Full Name <span class="text-red-500">*</span></label>
                        <input type="text" name="name" placeholder="John Doe" required
                            class="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 focus:border-electric-500 focus:bg-white focus:ring-4 focus:ring-electric-500/10 outline-none transition">
                    </div>
                    
                    <!-- Email -->
                    <div>
                        <label class="block text-slate-700 text-xs font-bold uppercase tracking-wider mb-2">Email Address <span class="text-red-500">*</span></label>
                        <input type="email" name="email" placeholder="john@example.com" required
                            class="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 focus:border-electric-500 focus:bg-white focus:ring-4 focus:ring-electric-500/10 outline-none transition">
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <!-- Profession -->
                    <div>
                        <label class="block text-slate-700 text-xs font-bold uppercase tracking-wider mb-2">Profession / Role <span class="text-red-500">*</span></label>
                        <input type="text" name="profession" placeholder="e.g. Software Engineer, Student" required
                            class="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 focus:border-electric-500 focus:bg-white focus:ring-4 focus:ring-electric-500/10 outline-none transition">
                    </div>

                    <!-- Company / University -->
                    <div>
                        <label class="block text-slate-700 text-xs font-bold uppercase tracking-wider mb-2">Company / University</label>
                        <input type="text" name="company" placeholder="e.g. UTS, Google (Optional)"
                            class="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 focus:border-electric-500 focus:bg-white focus:ring-4 focus:ring-electric-500/10 outline-none transition">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-slate-700 text-xs font-bold uppercase tracking-wider mb-2">Primary Mobile Device <span class="text-red-500">*</span></label>
                    <select name="device_type" required
                        class="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 focus:border-electric-500 focus:bg-white focus:ring-4 focus:ring-electric-500/10 outline-none transition appearance-none">
                        <option value="" disabled selected>Select your device...</option>
                        <option value="Android">Android (Samsung, Pixel, etc.)</option>
                        <option value="iOS">iOS (iPhone)</option>
                        <option value="Both">I use both</option>
                    </select>
                </div>

                <div class="mb-8">
                    <label class="block text-slate-700 text-xs font-bold uppercase tracking-wider mb-2">Why do you want to test Sydly? <span class="text-red-500">*</span></label>
                    <textarea name="reason" rows="4" required placeholder="Tell us about your daily commute or what features you are most excited about..."
                        class="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 focus:border-electric-500 focus:bg-white focus:ring-4 focus:ring-electric-500/10 outline-none transition resize-none"></textarea>
                </div>

                <!-- Fixed Submit Button: Replaced gradient with reliable solid slate-900 color -->
                <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 px-8 rounded-xl shadow-lg hover:-translate-y-1 transition duration-300 flex items-center justify-center gap-3">
                    <i class="fa-solid fa-paper-plane"></i> Apply for Beta
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full text-center py-8 text-slate-400 text-sm mt-auto border-t border-slate-200 z-10 relative bg-slate-50">
        <div class="max-w-4xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <span>&copy; 2026 Sydly. Created by Agam Singh Saini.</span>
            <div class="flex flex-wrap justify-center gap-4">
                <a href="index.html" class="hover:text-electric-500 transition">Home</a>
                <!-- <a href="install-guide.html" class="hover:text-electric-500 transition">Install Guide</a> -->
                <a href="privacy-policy.html" class="hover:text-electric-500 transition">Privacy</a>
                <a href="tester.html" class="text-electric-500 font-medium">Become a Tester</a>
            </div>
        </div>
    </footer>

    <script>
        const form = document.getElementById("testerForm");
        const submitBtn = document.getElementById("submitBtn");

        form.addEventListener("submit", function(event) {
            event.preventDefault();
            
            // UI Feedback during submission
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');

            const data = new FormData(form);
            fetch(form.action, {
                method: form.method,
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    // Redirect to the custom Thank You page
                    window.location.href = "thank-you-tester.html";
                } else {
                    alert("Oops! There was a problem submitting your form.");
                    submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Apply for Beta';
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                }
            }).catch(error => {
                alert("Network error. Please try again.");
                submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Apply for Beta';
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            });
        });
    </script>
</body>
</html>
